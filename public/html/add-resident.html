<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS Hub - Add Resident</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h3>HMS HUB</h3>
            </div>
            <nav class="sidebar-menu">
                <a href="/html/dashboard.html"><i class="fa-solid fa-chart-pie"></i> Overview</a>
                <a href="/html/residents.html" class="active"><i class="fa-solid fa-users"></i> Residents</a>
                <a href="/html/billing.html"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</a>
                <a href="/html/expenses.html"><i class="fa-solid fa-wallet"></i> Expenses</a>
                <a href="/html/complaints.html"><i class="fa-solid fa-circle-exclamation"></i> Complaints</a>
                <a href="/html/visitors-log.html"><i class="fa-solid fa-shield-halved"></i> Security Logs</a>
                <a href="/html/staff.html"><i class="fa-solid fa-user-tie"></i> Staff Management</a>
                <a href="/html/settings.html"><i class="fa-solid fa-gear"></i> Admin Settings</a>
                <a href="#" onclick="logout()" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div>
                    <h1>Resident Registry Onboarding</h1>
                    <p>Allocate profile credentials and structural billing variables dynamically.</p>
                </div>
            </header>

            <section class="data-section">
                <div class="form-container">
                    <form id="residentOnboardingForm" enctype="multipart/form-data">
                        <div class="form-grid">
                            <div class="input-group">
                                <label for="name"><i class="fa-solid fa-user"></i> Full Name</label>
                                <input type="text" id="name" required placeholder="e.g., Umair Afridi">
                            </div>
                            <div class="input-group">
                                <label for="house_no"><i class="fa-solid fa-house-chimney"></i> House / Flat Allocation No</label>
                                <input type="text" id="house_no" required placeholder="e.g., House 45-B">
                            </div>
                            <div class="input-group">
                                <label for="phone_no"><i class="fa-solid fa-phone"></i> Mobile Phone Number (WhatsApp Alert Ready)</label>
                                <input type="text" id="phone_no" required placeholder="e.g., 03001234567">
                            </div>
                            <div class="input-group">
                                <label for="email"><i class="fa-solid fa-envelope"></i> Active Email Address</label>
                                <input type="email" id="email" required placeholder="e.g., resident@gmail.com">
                            </div>
                            <div class="input-group">
                                <label for="cnic"><i class="fa-solid fa-id-card"></i> Government CNIC Number</label>
                                <input type="text" id="cnic" required placeholder="e.g., 42101-XXXXXXX-X">
                            </div>
                            <div class="input-group">
                                <label for="emergency_contact"><i class="fa-solid fa-phone-flip"></i> Emergency Contact No</label>
                                <input type="text" id="emergency_contact" required placeholder="e.g., 03112223344">
                            </div>
                            <div class="input-group">
                                <label for="monthly_bill"><i class="fa-solid fa-money-bill-wave"></i> Standard Monthly Maintenance dues (Rs.)</label>
                                <input type="number" id="monthly_bill" value="2500" required>
                            </div>
                            <div class="input-group">
                                <label for="address"><i class="fa-solid fa-location-dot"></i> Permanent Structural Address</label>
                                <input type="text" id="address" required placeholder="e.g., Sector F, Phase 6, Peshawar">
                            </div>
                            <div class="input-group">
                                <label for="cnicFront"><i class="fa-solid fa-file-arrow-up"></i> Upload CNIC Identification Front View</label>
                                <input type="file" id="cnicFront" accept="image/*">
                            </div>
                            <div class="input-group">
                                <label for="cnicBack"><i class="fa-solid fa-file-arrow-up"></i> Upload CNIC Identification Back View</label>
                                <input type="file" id="cnicBack" accept="image/*">
                            </div>

                            <div class="input-group" style="grid-column: 1 / -1; background: rgba(59, 130, 246, 0.03); border: 1px dashed rgba(59, 130, 246, 0.2); padding: 15px; border-radius: 6px; margin-top: 10px;">
                                <label for="rfid_uid" style="color: #3b82f6; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                    <i class="fa-solid fa-id-card"></i> Instant RFID Card Registration Node
                                </label>
                                <input type="text" id="rfid_uid" name="rfid_uid" placeholder="Focus cursor here and tap card on reader device... (e.g., A3B95C12)" style="width: 100%; padding: 12px; background: #1e293b; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: white; outline: none; font-family: monospace; font-size: 1.05rem; letter-spacing: 2px;">
                                <span style="font-size: 0.75rem; color: #64748b; display: block; margin-top: 6px;"><i class="fa-solid fa-circle-info"></i> Physical USB reader will auto-type the hex sequence if focused here.</span>
                            </div>

                        </div>
                        <div class="form-actions">
                            <button type="submit" id="submitBtn" class="trigger-btn auto-bill">
                                <i class="fa-solid fa-user-plus"></i> Initialize Profile & Dispatch Welcoming Notice
                            </button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/add-resident.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = "/html/login.html";
        }
    </script>
</body>
</html>
