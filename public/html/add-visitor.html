<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS Hub - Gatekeeper Security Console</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h3>HMS HUB</h3>
            </div>
            <nav class="sidebar-menu">
                <a href="/html/dashboard.html"><i class="fa-solid fa-chart-pie"></i> Overview</a>
                <a href="/html/residents.html"><i class="fa-solid fa-users"></i> Residents</a>
                <a href="/html/billing.html"><i class="fa-solid fa-file-invoice-dollar"></i> Billing</a>
                <a href="/html/expenses.html"><i class="fa-solid fa-wallet"></i> Expenses</a>
                <a href="/html/complaints.html"><i class="fa-solid fa-circle-exclamation"></i> Complaints</a>
                <a href="/html/visitors-log.html" class="active"><i class="fa-solid fa-shield-halved"></i> Security Logs</a>
                <a href="/html/staff.html"><i class="fa-solid fa-user-tie"></i> Staff Management</a>
                <a href="/html/settings.html"><i class="fa-solid fa-gear"></i> Admin Settings</a>
                <a href="#" onclick="logout()" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div>
                    <h1>Gatekeeper Security Check</h1>
                    <p>Log visitor identity and dispatch real-time intercom notifications to destination houses.</p>
                </div>
            </header>

            <section class="data-section">
                <div class="form-container">
                    <form id="visitorRegistryForm">
                        <div class="form-grid">
                            <div class="input-group">
                                <label for="visitor_name"><i class="fa-solid fa-user-tag"></i> Visitor Name</label>
                                <input type="text" id="visitor_name" required placeholder="e.g., Courier Rider, Guest">
                            </div>
                            <div class="input-group">
                                <label for="phone_no"><i class="fa-solid fa-mobile-screen-button"></i> Visitor Contact Number</label>
                                <input type="text" id="phone_no" required placeholder="e.g., 03331234567">
                            </div>
                            <div class="input-group">
                                <label for="house_no"><i class="fa-solid fa-building-user"></i> Destination House No</label>
                                <input type="text" id="house_no" required placeholder="e.g., House 45-B (Must match exact database record)">
                            </div>
                            <div class="input-group">
                                <label for="purpose"><i class="fa-solid fa-clipboard-question"></i> Purpose of Entry</label>
                                <input type="text" id="purpose" required placeholder="e.g., Delivery, Family Visit, Maintenance">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" id="gateSubmitBtn" class="trigger-btn auto-bill">
                                <i class="fa-solid fa-door-open"></i> Log Entry & Ping Resident Devices
                            </button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/add-visitor.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = "/html/login.html";
        }
    </script>
</body>
</html>
